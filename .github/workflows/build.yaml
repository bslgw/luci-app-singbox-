name: Build Sing-box Bridge IPK (All Architecture)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download OpenWrt SDK (x86_64)
        run: |
          curl -L -o sdk.tar.xz \
            https://downloads.openwrt.org/releases/23.05.4/targets/x86/64/openwrt-sdk-23.05.4-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz

      - name: Extract SDK
        run: |
          mkdir -p sdk
          tar -xJf sdk.tar.xz -C sdk --strip-components=1
          echo "SDK extracted successfully"

      - name: Prepare Package
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # 复制你的包
          rm -rf package/luci-app-singbox
          mkdir -p package/luci-app-singbox
          rsync -av --exclude 'sdk' --exclude '.git' --exclude '.github' \
            $GITHUB_WORKSPACE/ package/luci-app-singbox/

      - name: Compile IPK
        run: |
          cd sdk
          make defconfig
          make package/luci-app-singbox/clean || true
          make package/luci-app-singbox/compile V=s

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-singbox-all
          path: sdk/bin/packages/*/*/*.ipk
          retention-days: 30

      - name: Show Package Info
        run: |
          echo "=== Generated IPK files ==="
          find sdk/bin -name "*.ipk" | xargs ls -lh
          echo "=== Architecture check ==="
          for ipk in sdk/bin/packages/*/*/*.ipk; do
            if [ -f "$ipk" ]; then
              echo "$ipk"
              tar -xOf "$ipk" control.tar.gz 2>/dev/null | tar -xOf - ./control | grep -E "Package|Architecture|Version"
              echo "-------------------"
            fi
          done
