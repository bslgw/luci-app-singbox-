- name: Compile IPK
      run: |
        cd sdk
        # 1. 把你的整个仓库代码作为一个 "feed" 软链接进去，或者直接拷贝到 package 目录
        mkdir -p package/luci-app-singbox
        # 将当前仓库所有文件拷贝进 SDK 的 package 目录
        cp -r $GITHUB_WORKSPACE/* package/luci-app-singbox/
        
        # 2. 准备编译环境
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        make defconfig
        
        # 3. 开始编译
        make package/luci-app-singbox/compile V=s
