name: Build Sing-box Bridge IPK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 关键步骤：彻底扫描，找出所有文件的藏身之处
      - name: Find Files
        run: |
          echo "=== 正在扫描代码库中所有文件 ==="
          find . -maxdepth 4 -not -path '*/.*'
          echo "=== 正在专门寻找核心文件 ==="
          find . -name "singbox.lua" -o -name "Makefile" -o -name "config.js"
