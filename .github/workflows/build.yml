name: Build Sing-box Bridge IPK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Compilation Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache gettext libncurses5-dev libssl-dev xz-utils zlib1g-dev python3 rsync gawk file wget

      - name: Download Official OpenWrt SDK
        run: |
          # 將連結拆分後拼接，避免被 Runner 錯誤解析
          HOST="https://downloads.openwrt.org"
          PATH_URL="/releases/22.03.0/targets/x86/64/openwrt-sdk-22.03.0-x86-64_gcc-11.2.0_musl.Linux-x86_64.tar.xz"
          FULL_URL="${HOST}${PATH_URL}"
          
          echo "正在下載: ${FULL_URL}"
          curl -L -o sdk.tar.xz "${FULL_URL}"
          
          if ! file sdk.tar.xz | grep -q "XZ compressed data"; then
            echo "嚴重錯誤：檔案內容不正確。讀取到的檔案類型為："
            file sdk.tar.xz
            exit 1
          fi
          
          mkdir sdk
          tar -xJf sdk.tar.xz -C sdk --strip-components=1

      - name: Prepare Package
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          mkdir -p package/luci-app-singbox
          cp -r ../Makefile ../htdocs ../root package/luci-app-singbox/

      - name: Compile IPK
        run: |
          cd sdk
          make defconfig
          make package/luci-app-singbox/compile V=s

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-singbox-ipk
          path: sdk/bin/packages/x86_64/custom/luci-app-singbox*.ipk
