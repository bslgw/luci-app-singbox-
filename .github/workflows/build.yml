name: Build Sing-box Bridge IPK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Compilation Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache gettext libncurses5-dev libssl-dev xz-utils zlib1g-dev python3 rsync gawk file wget

      - name: Download Official OpenWrt SDK
        run: |
          SDK_URL="https://openwrt.org"
          curl -L -o sdk.tar.xz "$SDK_URL"
          mkdir sdk
          tar -xJf sdk.tar.xz -C sdk --strip-components=1

      - name: Prepare Package
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          # 建立 package 目錄，並確保原始碼完整複製
          mkdir -p package/luci-app-singbox
          cp -r ../Makefile ../htdocs ../root package/luci-app-singbox/

      - name: Compile IPK
        run: |
          cd sdk
          make defconfig
          # 使用 -j1 進行單執行緒編譯，方便出錯時排查日誌
          make package/luci-app-singbox/compile V=s -j1

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-singbox-ipk
          # 修改為通配符，搜索整個 bin 目錄下所有的 .ipk 檔案
          path: sdk/bin/**/*.ipk
