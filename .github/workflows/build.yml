name: Build Sing-box Bridge IPK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4  # 順便更新到 v4

      - name: Build IPK
        uses: immortalwrt/gh-action-sdk@master
        env:
          ARCH: x86_64-openwrt-22.03
          FEEDNAME: custom
          PACKAGES: luci-app-singbox
          INDEX: 1

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4  # 這裡已修正為 v4
        with:
          name: luci-app-singbox-ipk
          path: bin/packages/*/custom/luci-app-singbox*.ipk
