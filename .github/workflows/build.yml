name: Build Sing-box Bridge IPK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Compilation Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache gettext libncurses5-dev libssl-dev xz-utils zlib1g-dev python3 python3-distutils rsync

      - name: Download Official OpenWrt SDK
        run: |
          # 使用更精確的下載路徑與檔名處理
          wget -O sdk.tar.xz https://openwrt.org
          mkdir sdk
          tar -xJf sdk.tar.xz -C sdk --strip-components=1

      - name: Prepare Package
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          # 建立 package 目錄並連結源碼
          mkdir -p package/luci-app-singbox
          cp -r ../Makefile ../htdocs ../root package/luci-app-singbox/

      - name: Compile IPK
        run: |
          cd sdk
          make defconfig
          # 編譯指定包，V=s 顯示詳細日誌
          make package/luci-app-singbox/compile V=s

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-singbox-ipk
          # 使用通配符匹配編譯出的 ipk
          path: sdk/bin/packages/x86_64/custom/luci-app-singbox*.ipk
